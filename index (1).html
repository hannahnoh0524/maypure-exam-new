<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Maypure+ 신입교육 시험</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f8f8f8;color:#1a1a1a;font-size:15px;-webkit-tap-highlight-color:transparent;}
.page{display:none;min-height:100vh;padding:1.5rem 1rem;}
.page.on{display:block;}
.wrap{max-width:500px;margin:0 auto;}
.card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.logo{text-align:center;padding:1.5rem 0 1rem;}
.logo-txt{font-size:26px;font-weight:600;letter-spacing:-.5px;}
.logo-plus{color:#F5A623;}
.logo-sub{font-size:13px;color:#999;margin-top:5px;}
label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:500;}
input,select,textarea{width:100%;padding:11px 14px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:15px;background:#fff;color:#1a1a1a;outline:none;margin-bottom:1rem;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:#534AB7;}
textarea{resize:vertical;min-height:80px;margin-bottom:0;}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:8px;}
.btn-p{background:#534AB7;color:#fff;}
.btn-p:active{background:#3C3489;}
.btn-g{background:#f0f0f0;color:#555;}
.qcard{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.qmeta{font-size:11px;color:#aaa;margin-bottom:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.qtxt{font-size:15px;font-weight:500;line-height:1.6;margin-bottom:1rem;color:#1a1a1a;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:10px;border:1.5px solid #e5e5e5;margin-bottom:8px;cursor:pointer;font-size:14px;line-height:1.5;transition:all .1s;}
.opt:active{opacity:.8;}
.opt.sel{border-color:#534AB7;background:#F0EEFF;}
.onum{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa;font-weight:500;}
.opt.sel .onum{border-color:#534AB7;color:#534AB7;background:#e8e4ff;}
.bx{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.bx-ok{background:#d4edda;color:#155724;}
.bx-no{background:#f8d7da;color:#721c24;}
.bx-sk{background:#e9ecef;color:#495057;}
.bx-pn{background:#d0e8ff;color:#004085;}
.bx-top{background:#f8d7da;color:#721c24;}
.bx-hi{background:#fff3cd;color:#856404;}
.bx-mid{background:#d0e8ff;color:#004085;}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.sv{background:#f8f8f8;border-radius:10px;padding:12px;}
.sl{font-size:12px;color:#999;margin-bottom:3px;}
.sn{font-size:20px;font-weight:600;}
.prog{width:100%;height:5px;background:#eee;border-radius:3px;margin-bottom:1rem;}
.pf{height:100%;background:#534AB7;border-radius:3px;transition:width .3s;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;}
.tmr{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;padding:8px 14px;border-radius:10px;background:#f0f0f0;}
.tmr.warn{background:#FFF3CD;color:#856404;}
.tab-bar{display:flex;gap:2px;border-bottom:1.5px solid #eee;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{padding:9px 14px;font-size:13px;cursor:pointer;color:#aaa;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500;}
.tab.on{color:#534AB7;border-bottom-color:#534AB7;}
.tc{display:none;}.tc.on{display:block;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{padding:7px 8px;text-align:left;color:#999;font-weight:500;border-bottom:1px solid #f0f0f0;}
.tbl td{padding:7px 8px;border-bottom:1px solid #f8f8f8;}
.br{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;}
.bg{flex:1;height:12px;background:#f0f0f0;border-radius:3px;overflow:hidden;}
.bf{height:100%;background:#AFA9EC;border-radius:3px;}
.bf.r{background:#F09595;}
.ri{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px;}
.un-panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #534AB7;padding:12px 1rem;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.1);}
.un-btn{display:inline-block;padding:5px 10px;margin:2px;font-size:12px;border-radius:8px;border:1px solid #F09595;background:#fde8e8;color:#7f1d1d;cursor:pointer;}
.pin-wrap{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.pin-box{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:320px;}
.admin-btn{display:block;text-align:center;margin-top:1.5rem;color:#ccc;font-size:12px;cursor:pointer;padding:8px;}
.sec-t{font-size:11px;font-weight:600;color:#999;letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;}
</style>
</head>
<body>

<!-- 시작 화면 -->
<div id="pg0" class="page on">
<div class="wrap">
  <div class="logo">
    <div class="logo-txt">Maypure<span class="logo-plus">+</span></div>
    <div class="logo-sub">신입교육 시험 · 전범위 200문항 · 120분</div>
  </div>
  <div class="card">
    <label>이름</label>
    <input id="nm" type="text" placeholder="홍길동">
    <label>입사일</label>
    <input id="dt" type="date">
    <label>이메일 (결과 수신용)</label>
    <input id="em" type="email" placeholder="example@maypure.com" style="margin-bottom:0;">
  </div>
  <button class="btn btn-p" onclick="startExam()">시험 시작</button>
  <p style="text-align:center;font-size:12px;color:#bbb;margin-top:.5rem;">결과는 관리자 확인 후 이메일로 발송됩니다</p>
  <div class="admin-btn" onclick="openPin()">관리자</div>
</div>
</div>

<!-- 시험 화면 -->
<div id="pg1" class="page">
<div class="wrap">
  <div class="topbar">
    <div id="enm" style="font-size:14px;font-weight:500;"></div>
    <div class="tmr" id="tmr">⏱ <span id="td">120:00</span></div>
  </div>
  <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
  <div id="qcon"></div>
  <button class="btn btn-p" style="margin-top:4px;margin-bottom:4rem;" onclick="trySubmit()">제출하기</button>
</div>
</div>

<!-- 결과 화면 -->
<div id="pg2" class="page">
<div class="wrap">
  <div style="text-align:center;margin-bottom:1.25rem;padding-top:.5rem;">
    <div style="font-size:20px;font-weight:600;" id="rn"></div>
    <div style="font-size:12px;color:#999;margin-top:4px;" id="rm"></div>
  </div>
  <div class="sg">
    <div class="sv"><div class="sl">점수</div><div class="sn" id="rsc"></div></div>
    <div class="sv"><div class="sl">정답</div><div class="sn" id="rco" style="color:#155724;"></div></div>
    <div class="sv"><div class="sl">오답</div><div class="sn" id="rwr" style="color:#721c24;"></div></div>
  </div>
  <div class="card">
    <div class="sec-t">문항별 결과</div>
    <div id="rl"></div>
    <div style="margin-top:10px;padding:10px;background:#f8f8f8;border-radius:10px;font-size:12px;color:#999;">서술형은 관리자 검토 후 최종 점수가 확정되며 이메일로 발송됩니다.</div>
  </div>
  <button class="btn btn-g" onclick="goHome()">처음으로</button>
</div>
</div>

<!-- 관리자 대시보드 -->
<div id="pg3" class="page" style="background:#f8f8f8;">
<div class="wrap" style="max-width:600px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-top:.5rem;">
    <div style="font-size:17px;font-weight:600;">관리자 대시보드</div>
    <button class="btn btn-g" style="width:auto;padding:8px 16px;font-size:13px;margin:0;" onclick="goHome()">나가기</button>
  </div>
  <div class="tab-bar">
    <div class="tab on" onclick="swTab('ta',this)">현황</div>
    <div class="tab" onclick="swTab('tb',this)">기수별</div>
    <div class="tab" onclick="swTab('tc',this)">오답순위</div>
    <div class="tab" onclick="swTab('td',this)">분포</div>
    <div class="tab" onclick="swTab('te',this)">발송</div>
    <div class="tab" onclick="swTab('tf',this)">풀이지</div>
  </div>
  <div id="ta" class="tc on">
    <div class="sg" id="ast" style="grid-template-columns:repeat(2,1fr);"></div>
    <div class="card">
      <div class="sec-t">응시 기록</div>
      <div style="overflow-x:auto;">
        <table class="tbl">
          <thead><tr><th>이름</th><th>점수</th><th>입사일</th><th>이메일</th><th>응시일시</th><th>답지</th><th>삭제</th></tr></thead>
          <tbody id="rtb"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="tb" class="tc">
    <div class="card">
      <div class="sec-t">기수 선택</div>
      <select id="csel" onchange="rCohort()" style="margin-bottom:1rem;"><option value="">기수 선택</option></select>
      <div id="cdet"></div>
    </div>
  </div>
  <div id="tc" class="tc">
    <div class="card">
      <div class="sec-t">오답률 높은 문항 (상위 15개)</div>
      <div id="wrl"></div>
    </div>
  </div>
  <div id="td" class="tc">
    <div class="card">
      <div class="sec-t">점수 분포</div>
      <div id="dist"></div>
    </div>
  </div>
  <div id="te" class="tc">
    <div class="card">
      <div class="sec-t">결과 발송</div>
      <div style="font-size:12px;color:#999;margin-bottom:1rem;padding:8px 10px;background:#f8f8f8;border-radius:10px;">맞음/틀림 결과만 발송됩니다. 정답은 포함되지 않습니다.</div>
      <div id="sndlist"></div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
        <button class="btn btn-p" style="width:auto;padding:10px 18px;margin:0;font-size:14px;" onclick="doSend()">선택 발송</button>
        <button class="btn btn-g" style="width:auto;padding:10px 14px;margin:0;font-size:13px;" onclick="selAll(1)">전체선택</button>
        <button class="btn btn-g" style="width:auto;padding:10px 14px;margin:0;font-size:13px;" onclick="selAll(0)">전체해제</button>
      </div>
      <div id="sndres" style="font-size:12px;color:#534AB7;margin-top:10px;"></div>
    </div>
  </div>
  <div id="tf" class="tc">
    <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;">
      <select id="akch" onchange="rAK()" style="margin:0;flex:1;min-width:120px;"><option value="">전체 챕터</option></select>
      <select id="akty" onchange="rAK()" style="margin:0;width:90px;"><option value="">유형</option><option value="mc">객관식</option><option value="short">단답</option><option value="essay">서술</option></select>
      <select id="akdf" onchange="rAK()" style="margin:0;width:90px;"><option value="">난이도</option><option value="중상">중상</option><option value="상">상</option><option value="최상">최상</option></select>
    </div>
    <div id="akl"></div>
  </div>
</div>
</div>

<!-- PIN 오버레이 -->
<div class="pin-wrap" id="pinwrap">
  <div class="pin-box">
    <div style="font-size:16px;font-weight:600;margin-bottom:4px;">관리자 접근</div>
    <div style="font-size:13px;color:#999;margin-bottom:1rem;">PIN을 입력하세요</div>
    <input type="password" id="pi" placeholder="••••" style="margin-bottom:10px;" onkeydown="if(event.key==='Enter')checkPin()">
    <div style="display:flex;gap:8px;">
      <button class="btn btn-p" style="margin:0;flex:1;padding:12px;" onclick="checkPin()">확인</button>
      <button class="btn btn-g" style="margin:0;flex:1;padding:12px;" onclick="closePin()">취소</button>
    </div>
    <div id="pe" style="font-size:12px;color:#dc3545;margin-top:8px;display:none;">PIN이 올바르지 않습니다.</div>
  </div>
</div>

<script>
const PIN='9999';
const GAS='https://script.google.com/macros/s/AKfycbyor1J9j60UL4EDlEhfWWspdaHHswXlYAutk2NUY5qxlGsl9xD84fAJ_GZsGl89xW8/exec';
let tmrI=null,tLeft=7200,cu={},_recs=[];

function $(id){return document.getElementById(id);}
function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));$(id).classList.add('on');window.scrollTo(0,0);}
function getCL(d){if(!d)return '미입력';return d+' 입사';}

// PIN
function openPin(){$('pinwrap').style.display='flex';$('pi').value='';$('pe').style.display='none';setTimeout(()=>$('pi').focus(),100);}
function closePin(){$('pinwrap').style.display='none';}
function checkPin(){if($('pi').value===PIN){closePin();goAdmin();}else $('pe').style.display='block';}

// 문항 데이터
const QS = [

// ===================== 목차 1: 레이저 공통 (10문항) =====================

opts:['기계 전원 상태만 확인한다','고객 이름과 차트를 반드시 확인한다','시술 부위 사진만 확인한다','예약 시간만 확인한다'],
ans:1,
exp:'준비 전 고객 이름과 차트 확인은 필수 공통 확인사항입니다.',
cri:'②번 선택'},

{id:2,type:'mc',ch:'레이저 공통',dif:'중상',
text:'레이저 연달아 시술 시 기계 운용 방식으로 올바른 것은?',
opts:['반드시 기계를 껐다 켜야 한다','기계를 끄지 않고 그대로 연속 사용할 수 있다','10분 이상 대기 후 재가동해야 한다','원장 지시가 있을 때만 연속 사용 가능하다'],
ans:1,
exp:'레이저 연달아 시술 시 기계를 껐다 켜는 절차는 생략 가능합니다.',

{id:3,type:'mc',ch:'레이저 공통',dif:'상',

ans:3,

'준비 전 차트 확인 필수 / 연속 시술 시 반드시 ON·OFF / 사우나는 3일 자제'
],
ans:0,
exp:'①이 세 가지 공통 확인사항을 모두 정확히 서술합니다.',
cri:'①번 선택 및 세 가지 항목 모두 정확히 기술'},

{id:7,type:'mc',ch:'레이저 공통',dif:'중상',
text:'레이저 시술 당일 고객이 할 수 있는 것은?',
opts:['사우나','스크럽','세안 및 메이크업','음주'],
ans:2,
exp:'당일 세안 및 메이크업은 가능합니다. 사우나·스크럽·음주는 1주일간 자제 안내 대상입니다.',
cri:'③번 선택'},

// 시험 시작
function startExam(){
  var n=$('nm').value.trim(),d=$('dt').value,e=$('em').value.trim();
  if(!n){alert('이름을 입력해주세요.');return;}
  if(!d){alert('입사일을 입력해주세요.');return;}
  if(!e){alert('이메일 주소를 입력해주세요.');return;}
  cu={name:n,date:d,email:e};
  $('enm').textContent=n+' 님';
  buildQ();show('pg1');startTmr();
}

function buildQ(){
  var c=$('qcon');c.innerHTML='';
  QS.forEach(function(q,i){
    var d=document.createElement('div');d.className='qcard';d.id='qc'+i;
    var tl=q.type==='mc'?'객관식':q.type==='short'?'단답형':'서술형';
    var dc=q.dif==='최상'?'bx-top':q.dif==='상'?'bx-hi':'bx-mid';
    d.innerHTML='<div class="qmeta"><span class="bx '+dc+'">'+q.dif+'</span><span style="color:#ccc;">|</span><span style="color:#aaa;font-size:11px;">'+tl+'</span><span style="color:#ccc;">|</span><span style="color:#aaa;font-size:11px;">'+(i+1)+'/'+QS.length+'번</span></div><div class="qtxt">'+q.text+'</div>';
    if(q.type==='mc'){
      q.opts.forEach(function(o,oi){
        var r=document.createElement('div');r.className='opt';r.dataset.qi=i;r.dataset.oi=oi;
        r.innerHTML='<span class="onum">'+(oi+1)+'</span><span>'+o+'</span>';
        r.onclick=function(){selOpt(i,oi);updProg();};
        d.appendChild(r);
      });
    } else if(q.type==='short'){
      var inp=document.createElement('input');inp.type='text';inp.id='sa'+i;inp.placeholder='답을 입력하세요';inp.style.marginBottom='0';inp.oninput=updProg;d.appendChild(inp);
    } else {
      var ta=document.createElement('textarea');ta.id='sa'+i;ta.placeholder='서술형 답변을 작성하세요 (관리자 검토 후 채점됩니다)';ta.oninput=updProg;d.appendChild(ta);
    }
    c.appendChild(d);
  });
}

function selOpt(qi,oi){
  document.querySelectorAll('.opt[data-qi="'+qi+'"]').forEach(function(e){e.classList.remove('sel');});
  document.querySelector('.opt[data-qi="'+qi+'"][data-oi="'+oi+'"]').classList.add('sel');
}

function updProg(){
  var ans=0;
  QS.forEach(function(q,i){
    if(q.type==='mc'){if(document.querySelector('.opt.sel[data-qi="'+i+'"]'))ans++;}
    else{var el=$('sa'+i);if(el&&el.value.trim())ans++;}
  });
  $('pf').style.width=Math.round(ans/QS.length*100)+'%';
}

function startTmr(){
  tLeft=7200;updTmr();
  tmrI=setInterval(function(){
    tLeft--;updTmr();
    if(tLeft<=600)$('tmr').classList.add('warn');
    if(tLeft<=0){clearInterval(tmrI);doSubmit();}
  },1000);
}
function updTmr(){
  var m=Math.floor(tLeft/60),s=tLeft%60;
  $('td').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}

function trySubmit(){
  var un=[];
  QS.forEach(function(q,i){
    var ok=false;
    if(q.type==='mc')ok=!!document.querySelector('.opt.sel[data-qi="'+i+'"]');
    else{var el=$('sa'+i);ok=!!(el&&el.value.trim());}
    if(!ok)un.push(i+1);
  });
  if(un.length>0){showUN(un);return;}
  doSubmit();
}

function showUN(nums){
  var old=document.getElementById('unpanel');
  if(old) old.remove();
  var p=document.createElement('div');
  p.id='unpanel';
  p.className='un-panel';
  var btns=nums.slice(0,25).map(function(n){
    return '<span class="un-btn" onclick="jumpQ('+n+')">'+n+'번</span>';
  }).join('');
  var more=nums.length>25?'<span style="font-size:11px;color:#999;"> 외 '+(nums.length-25)+'개</span>':'';
  var submitBtn=document.createElement('button');
  submitBtn.className='btn btn-p';
  submitBtn.style.cssText='padding:10px;font-size:13px;margin:0;';
  submitBtn.textContent='그대로 제출';
  submitBtn.onclick=function(){doSubmit();var el=document.getElementById('unpanel');if(el)el.remove();};

  var closeBtn=document.createElement('button');
  closeBtn.className='btn btn-g';
  closeBtn.style.cssText='padding:10px 16px;font-size:13px;margin:0;width:auto;';
  closeBtn.textContent='닫기';
  closeBtn.onclick=function(){var el=document.getElementById('unpanel');if(el)el.remove();};

  var btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px;';
  btnRow.appendChild(submitBtn);
  btnRow.appendChild(closeBtn);

  var title=document.createElement('div');
  title.style.cssText='font-size:13px;font-weight:600;color:#7f1d1d;margin-bottom:8px;';
  title.textContent='미응답 '+nums.length+'문항 — 번호 클릭 시 해당 문항으로 이동';

  var btnArea=document.createElement('div');
  btnArea.style.marginBottom='10px';
  btnArea.innerHTML=btns+more;

  p.appendChild(title);
  p.appendChild(btnArea);
  p.appendChild(btnRow);
  document.getElementById('pg1').appendChild(p);
}

function jumpQ(n){
  var el=$('qc'+(n-1));
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid #534AB7';setTimeout(function(){el.style.outline='';},1800);}
}

function doSubmit(){
  clearInterval(tmrI);
  var answers=[],correct=0;
  QS.forEach(function(q,i){
    if(q.type==='mc'){
      var sel=document.querySelector('.opt.sel[data-qi="'+i+'"]');
      var chosen=sel?parseInt(sel.dataset.oi):-1;
      var ok=chosen===q.ans;if(ok)correct++;
      answers.push({type:'mc',chosen:chosen,ok:ok,skipped:chosen===-1});
    } else {
      var val=($('sa'+i)||{}).value||'';
      var ok=q.type==='short'&&q.ans.some(function(a){return val.includes(a);});
      if(ok)correct++;
      answers.push({type:q.type,val:val,ok:ok,skipped:val.trim()==='',isEssay:q.type==='essay'});
    }
  });
  var sc=QS.filter(function(q){return q.type!=='essay';}).length;
  var score=Math.round(correct/sc*100);
  var rec={id:'rec_'+Date.now(),name:cu.name,email:cu.email,date:cu.date,score:score,correct:correct,total:QS.length,scorable:sc,answers:answers,ts:new Date().toLocaleString('ko-KR'),sent:false};
  saveRec(rec);showResult(rec);
}

function showResult(r){
  $('rn').textContent=r.name+' 님의 결과';
  $('rm').textContent='입사일 '+r.date+' · '+r.ts;
  $('rsc').textContent=r.score+'점';
  $('rco').textContent=r.correct+'개';
  $('rwr').textContent=(r.scorable-r.correct)+'개';
  var list=$('rl');list.innerHTML='';
  var chs=[...new Set(QS.map(function(q){return q.ch;}))];
  chs.forEach(function(ch){
    var chQs=QS.map(function(q,i){return{q:q,i:i};}).filter(function(x){return x.q.ch===ch;});
    var div=document.createElement('div');
    div.innerHTML='<div style="font-size:11px;color:#aaa;padding:6px 0 3px;font-weight:600;">'+ch+'</div>';
    chQs.forEach(function(x){
      var a=r.answers[x.i];
      var row=document.createElement('div');
      row.style.cssText='padding:10px 0;border-bottom:1px solid #f5f5f5;';
      var badge=a.isEssay?'<span class="bx bx-pn">검토 대기</span>':a.skipped?'<span class="bx bx-sk">미응답</span>':a.ok?'<span class="bx bx-ok">정답</span>':'<span class="bx bx-no">오답</span>';
      var rowHtml='<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:4px;">'+badge+'<span style="color:#bbb;font-size:11px;flex-shrink:0;">'+(x.i+1)+'번</span><span style="font-size:13px;line-height:1.5;">'+x.q.text+'</span></div>';
      if(x.q.type==='mc'&&!a.skipped&&a.chosen>=0){
        rowHtml+='<div style="font-size:12px;color:#555;background:#f8f8f8;padding:6px 10px;border-radius:8px;margin-top:4px;">내 답: '+x.q.opts[a.chosen]+'</div>';
      } else if((x.q.type==='short'||x.q.type==='essay')&&!a.skipped){
        rowHtml+='<div style="font-size:12px;color:#555;background:#f8f8f8;padding:6px 10px;border-radius:8px;margin-top:4px;">내 답: '+(a.val||'(미작성)')+'</div>';
      }
      row.innerHTML=rowHtml;
      div.appendChild(row);
    });
    list.appendChild(div);
  });
  show('pg2');
}

async function saveRec(r){
  try{
    await fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:r.name,email:r.email,join_date:r.date,score:r.score,correct:r.correct,total:r.total,submitted_at:r.ts,answers:r.answers,rec_id:r.id})
    });
  }catch(e){console.warn('저장 오류',e);}
  try{var all=JSON.parse(localStorage.getItem('mp')||'[]');all.unshift(r);localStorage.setItem('mp',JSON.stringify(all.slice(0,300)));}catch(e){}
}

async function loadRecs(){
  try{
    var resp=await fetch(GAS+'?action=list');
    var data=await resp.json();
    if(data&&data.records)return data.records.map(function(r){return Object.assign({},r,{ts:r.ts||r.submitted_at,date:r.date||r.join_date});});
  }catch(e){}
  try{return JSON.parse(localStorage.getItem('mp')||'[]');}catch(e){return[];}
}

async function goAdmin(){
  show('pg3');
  $('ast').innerHTML='<div style="color:#aaa;font-size:13px;padding:.5rem;">불러오는 중...</div>';
  var recs=await loadRecs();
  _recs=recs;
  var chs=[...new Set(QS.map(function(q){return q.ch;}))];
  var cohorts=[...new Set(recs.map(function(r){return getCL(r.date);}))].sort();
  [$('csel')].forEach(function(s){
    while(s.options.length>1)s.remove(1);
    cohorts.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;s.appendChild(o);});
  });
  $('akch').innerHTML='<option value="">전체 챕터</option>'+chs.map(function(c){return'<option value="'+c+'">'+c+'</option>';}).join('');
  rAst();rWR();rDist();rSnd();rAK();
}

function rAst(){
  var avg=_recs.length?Math.round(_recs.reduce(function(s,r){return s+r.score;},0)/_recs.length):0;
  $('ast').innerHTML='<div class="sv"><div class="sl">총 응시자</div><div class="sn">'+_recs.length+'명</div></div><div class="sv"><div class="sl">평균 점수</div><div class="sn">'+avg+'점</div></div><div class="sv"><div class="sl">80점 이상</div><div class="sn">'+_recs.filter(function(r){return r.score>=80;}).length+'명</div></div><div class="sv"><div class="sl">미발송</div><div class="sn" style="color:#dc3545;">'+_recs.filter(function(r){return !r.sent;}).length+'명</div></div>';
  var tb=$('rtb');
  if(!_recs.length){tb.innerHTML='<tr><td colspan="5" style="padding:1rem;text-align:center;color:#aaa;font-size:12px;">응시 기록이 없습니다</td></tr>';return;}
  tb.innerHTML=_recs.map(function(r,ri){return'<tr>'
      +'<td>'+r.name+'</td>'
      +'<td style="font-weight:600;">'+r.score+'점</td>'
      +'<td style="color:#aaa;font-size:11px;">'+r.date+'</td>'
      +'<td style="color:#aaa;font-size:11px;">'+(r.email||'-')+'</td>'
      +'<td style="color:#aaa;font-size:11px;">'+r.ts+'</td>'
      +'<td><button onclick="showDetail('+ri+')" style="padding:4px 10px;font-size:11px;border-radius:6px;border:1px solid #534AB7;background:#F0EEFF;color:#534AB7;cursor:pointer;">답지</button></td>'
      +'<td><button onclick="delRec('+ri+')" style="padding:4px 10px;font-size:11px;border-radius:6px;border:1px solid #dc3545;background:#fde8e8;color:#dc3545;cursor:pointer;">삭제</button></td>'
      +'</tr>';}).join('');
}

function rCohort(){
  var ch=$('csel').value;
  var recs=_recs.filter(function(r){return getCL(r.date)===ch;});
  var el=$('cdet');
  if(!ch){el.innerHTML='';return;}
  if(!recs.length){el.innerHTML='<div style="color:#aaa;font-size:12px;">해당 기수 응시 기록이 없습니다.</div>';return;}
  var avg=Math.round(recs.reduce(function(s,r){return s+r.score;},0)/recs.length);
  el.innerHTML='<div class="sg" style="grid-template-columns:repeat(2,1fr);"><div class="sv"><div class="sl">응시자</div><div class="sn">'+recs.length+'명</div></div><div class="sv"><div class="sl">평균</div><div class="sn">'+avg+'점</div></div></div>'+recs.map(function(r){return'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px;"><span>'+r.name+'</span><span style="font-weight:600;">'+r.score+'점</span><span class="bx '+(r.sent?'bx-ok':'bx-sk')+'" style="font-size:11px;">'+(r.sent?'발송완료':'미발송')+'</span></div>';}).join('');
}

function rWR(){
  var el=$('wrl');
  if(!_recs.length){el.innerHTML='<div style="color:#aaa;font-size:12px;">데이터가 없습니다.</div>';return;}
  var ranked=QS.map(function(q,i){
    if(q.type==='essay')return null;
    var tot=_recs.filter(function(r){return r.answers&&r.answers[i];}).length;
    var wc=_recs.filter(function(r){return r.answers&&r.answers[i]&&!r.answers[i].ok;}).length;
    return{q:q,i:i,wc:wc,pct:tot?Math.round(wc/tot*100):0};
  }).filter(Boolean).sort(function(a,b){return b.pct-a.pct;}).slice(0,15);
  el.innerHTML=ranked.map(function(item,rank){return'<div class="br"><span style="width:20px;font-size:11px;color:#aaa;">'+(rank+1)+'</span><span style="width:180px;font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">['+item.q.ch.slice(0,5)+'] '+item.q.text.slice(0,18)+'…</span><div class="bg"><div class="bf'+(item.pct>=60?' r':'')+'" style="width:'+item.pct+'%;"></div></div><span style="width:34px;font-size:12px;font-weight:600;color:'+(item.pct>=60?'#dc3545':'#333')+';">'+item.pct+'%</span></div>';}).join('');
}

function rDist(){
  var el=$('dist');
  if(!_recs.length){el.innerHTML='<div style="color:#aaa;font-size:12px;">데이터가 없습니다.</div>';return;}
  var bands=[{l:'90~100점',f:function(r){return r.score>=90;}},{l:'80~89점',f:function(r){return r.score>=80&&r.score<90;}},{l:'70~79점',f:function(r){return r.score>=70&&r.score<80;}},{l:'60~69점',f:function(r){return r.score>=60&&r.score<70;}},{l:'60점 미만',f:function(r){return r.score<60;}}];
  el.innerHTML=bands.map(function(b){var n=_recs.filter(b.f).length;return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span style="width:60px;font-size:11px;color:#aaa;text-align:right;">'+b.l+'</span><div style="flex:1;">'+Array(n).fill('<div style="width:9px;height:9px;border-radius:2px;background:#AFA9EC;display:inline-block;margin:1px;"></div>').join('')+'</div><span style="font-size:12px;font-weight:600;min-width:24px;">'+n+'명</span></div>';}).join('');
}

function rSnd(){
  var el=$('sndlist');
  if(!_recs.length){el.innerHTML='<div style="color:#aaa;font-size:12px;padding:.5rem 0;">응시 기록이 없습니다.</div>';return;}

  // 미발송/발송완료 분리
  var unsent=_recs.filter(function(r){return !r.sent;});
  var sent=_recs.filter(function(r){return r.sent;});

  var html='';

  // 미발송 목록
  if(unsent.length){
    html+='<div style="font-size:12px;font-weight:600;color:#333;margin-bottom:8px;">📤 미발송 ('+unsent.length+'명)</div>';
    html+='<div style="margin-bottom:4px;"><label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#666;cursor:pointer;padding:6px 0;"><input type="checkbox" id="chkAll" style="width:18px;height:18px;cursor:pointer;" onchange="selAll(this.checked?1:0)"> 전체 선택</label></div>';
    html+='<div style="border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;margin-bottom:1rem;">';
    unsent.forEach(function(r,i){
      var rid=r.id||r.rec_id||'';
      html+='<label style="display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;background:'+(i%2===0?'#fff':'#f9f9f9')+';border-bottom:1px solid #f0f0f0;">'
        +'<input type="checkbox" class="sc" data-id="'+rid+'" style="width:18px;height:18px;flex-shrink:0;cursor:pointer;">'
        +'<div style="flex:1;">'
        +'<div style="font-size:14px;font-weight:500;color:#333;">'+r.name+'</div>'
        +'<div style="font-size:12px;color:#aaa;margin-top:2px;">'+(r.email||'-')+'</div>'
        +'</div>'
        +'<div style="text-align:right;">'
        +'<div style="font-size:15px;font-weight:600;color:#333;">'+r.score+'점</div>'
        +'<div style="font-size:11px;color:#aaa;">'+r.date+'</div>'
        +'</div>'
        +'</label>';
    });
    html+='</div>';
  } else {
    html+='<div style="padding:12px;background:#f0fff4;border-radius:10px;font-size:13px;color:#155724;margin-bottom:1rem;">✓ 미발송 대상자가 없습니다.</div>';
  }

  // 발송완료 목록
  if(sent.length){
    html+='<div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px;">✅ 발송완료 ('+sent.length+'명)</div>';
    html+='<div style="border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;">';
    sent.forEach(function(r,i){
      html+='<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:'+(i%2===0?'#fff':'#f9f9f9')+';border-bottom:1px solid #f0f0f0;">'
        +'<div style="width:18px;height:18px;border-radius:4px;background:#28a745;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
        +'<span style="color:#fff;font-size:12px;font-weight:700;">✓</span></div>'
        +'<div style="flex:1;">'
        +'<div style="font-size:13px;font-weight:500;color:#666;">'+r.name+'</div>'
        +'<div style="font-size:11px;color:#aaa;">'+(r.email||'-')+'</div>'
        +'</div>'
        +'<div style="font-size:13px;font-weight:500;color:#aaa;">'+r.score+'점</div>'
        +'</div>';
    });
    html+='</div>';
  }

  el.innerHTML=html;
}

function selAll(v){document.querySelectorAll('.sc').forEach(function(c){c.checked=!!v;});}

async function doSend(){
  var sel=[...document.querySelectorAll('.sc:checked')].map(function(c){return c.dataset.id;});
  if(!sel.length){alert('발송할 대상을 선택해주세요.');return;}
  var targets=_recs.filter(function(r){return sel.includes(r.id||r.rec_id||'');});
  var el=$('sndres');
  el.style.display='block';
  el.textContent='발송 처리 중... (0/'+targets.length+')';
  var cnt=0,fail=0;
  for(var i=0;i<targets.length;i++){
    var r=targets[i];
    var body=makeEmailBody(r);
    try{
      var resp=await fetch(GAS,{
        method:'POST',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'markSent',rec_id:r.id||r.rec_id,email:r.email,emailBody:body,sentAt:new Date().toLocaleString('ko-KR')})
      });
      r.sent=true;cnt++;
    }catch(e){
      // CORS 오류 시 no-cors fallback
      try{
        await fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'markSent',rec_id:r.id||r.rec_id,email:r.email,emailBody:body,sentAt:new Date().toLocaleString('ko-KR')})
        });
        r.sent=true;cnt++;
      }catch(e2){fail++;}
    }
    el.textContent='발송 처리 중... ('+cnt+'/'+targets.length+')';
  }
  var msg=cnt+'명 발송 완료';
  if(fail>0) msg+=' ('+fail+'명 실패)';
  el.innerHTML='<div style="padding:10px 12px;background:#d4edda;border-radius:8px;color:#155724;font-weight:500;">✓ '+msg+'</div>';
  rSnd();rAst();
}

function rAK(){
  var cf=$('akch').value,tf=$('akty').value,df=$('akdf').value;
  var list=QS.filter(function(q){return(!cf||q.ch===cf)&&(!tf||q.type===tf)&&(!df||q.dif===df);});
  var el=$('akl');
  if(!list.length){el.innerHTML='<div style="color:#aaa;font-size:12px;">해당 문항이 없습니다.</div>';return;}
  el.innerHTML=list.map(function(q){
    var tl=q.type==='mc'?'객관식':q.type==='short'?'단답형':'서술형';
    var dc=q.dif==='최상'?'bx-top':q.dif==='상'?'bx-hi':'bx-mid';
    var ah=q.type==='mc'?'<div style="padding:8px 12px;background:#f8f8f8;border-radius:10px;font-size:13px;margin-bottom:6px;"><strong>정답: '+(q.ans+1)+'번</strong> — '+q.opts[q.ans]+'</div><div style="font-size:12px;color:#aaa;margin-bottom:6px;line-height:1.8;">'+q.opts.map(function(o,i){return'<span style="display:block;">'+(i+1)+'. '+o+(i===q.ans?' ✓':'')+'</span>';}).join('')+'</div>':q.type==='short'?'<div style="padding:8px 12px;background:#f8f8f8;border-radius:10px;font-size:13px;margin-bottom:6px;"><strong>정답 키워드:</strong> '+q.ans.join(' / ')+'</div>':'<div style="padding:8px 12px;background:#f8f8f8;border-radius:10px;font-size:13px;margin-bottom:6px;"><strong>핵심 키워드:</strong> '+q.ans.join(' / ')+'<br><span style="color:#aaa;">서술형 — 관리자 직접 채점</span></div>';
    return'<div style="background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;"><span class="bx '+dc+'">'+q.dif+'</span><span style="font-size:11px;color:#aaa;">'+tl+' · Q'+q.id+' · '+q.ch+'</span></div><div style="font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.6;color:#1a1a1a;">'+q.text+'</div>'+ah+'<div style="font-size:12px;color:#888;line-height:1.6;"><strong>해설:</strong> '+q.exp+'</div><div style="font-size:12px;color:#888;margin-top:3px;line-height:1.6;"><strong>채점 기준:</strong> '+q.cri+'</div></div>';
  }).join('');
}

function swTab(id,el){
  document.querySelectorAll('.tc').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  $(id).classList.add('on');el.classList.add('on');
  if(id==='tb')rCohort();
  if(id==='tc')rWR();
  if(id==='td')rDist();
  if(id==='te')rSnd();
  if(id==='tf')rAK();
}

// 답지 상세보기 + 채점

  var r=_recs[idx];
  if(!r)return;
  var modal=document.createElement('div');
  modal.id='detail-modal';
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;overflow-y:auto;padding:1rem;';
  var box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:16px;padding:1.25rem;max-width:600px;margin:0 auto;margin-bottom:2rem;';

  // 헤더
  var header=document.createElement('div');
  header.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;';
  header.innerHTML='<div>'
    +'<div style="font-size:16px;font-weight:600;">'+r.name+' 님 답지</div>'
    +'<div style="font-size:12px;color:#aaa;margin-top:2px;">'+r.ts+' · 현재 '+r.score+'점</div>'
    +'</div>'
    +'<button id="detail-close-btn" style="background:#f0f0f0;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;flex-shrink:0;">닫기</button>';
  box.appendChild(header);

  // 채점 안내
  var needGrade=QS.some(function(q,i){return (q.type==='short'||q.type==='essay')&&r.answers&&r.answers[i]&&!r.answers[i].skipped;});
  if(needGrade){
    var notice=document.createElement('div');
    notice.style.cssText='background:#FFF3CD;border-radius:10px;padding:10px 14px;font-size:12px;color:#856404;margin-bottom:1rem;';
    notice.textContent='단답형·서술형 문항을 채점하고 저장 버튼을 눌러주세요.';
    box.appendChild(notice);
  }

  // 문항 목록
  var qList=document.createElement('div');
  QS.forEach(function(q,i){
    var a=r.answers?r.answers[i]:null;
    var div=document.createElement('div');
    div.style.cssText='padding:12px 0;border-bottom:1px solid #f5f5f5;';

    if(!a){
      div.innerHTML='<div style="font-size:12px;color:#aaa;">'+(i+1)+'번 — 응답 없음</div>';
      qList.appendChild(div);return;
    }

    var isSA=q.type==='short'||q.type==='essay';
    var statusBadge='';
    if(q.type==='essay') statusBadge='<span class="bx bx-pn">서술형</span>';
    else if(q.type==='short') statusBadge='<span class="bx bx-pn">단답형</span>';
    else if(a.skipped) statusBadge='<span class="bx bx-sk">미응답</span>';
    else if(a.ok) statusBadge='<span class="bx bx-ok">정답</span>';
    else statusBadge='<span class="bx bx-no">오답</span>';

    var qHtml='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">'
      +statusBadge
      +'<span style="font-size:11px;color:#aaa;">'+(i+1)+'번</span>'
      +'<span style="font-size:13px;font-weight:500;">'+q.text+'</span>'
      +'</div>';

    // 객관식 - 선택 보기 표시
    if(q.type==='mc'){
      if(a.chosen>=0){
        qHtml+='<div style="font-size:12px;color:#555;background:#f8f8f8;padding:6px 10px;border-radius:8px;margin-bottom:4px;">선택: '+q.opts[a.chosen]+'</div>';
        if(!a.ok){
          qHtml+='<div style="font-size:12px;color:#155724;background:#d4edda;padding:6px 10px;border-radius:8px;">정답: '+q.opts[q.ans]+'</div>';
        }
      }
    }

    // 단답형/서술형 - 답변 + 채점 UI
    if(isSA){
      var ansVal=a.val||'(미작성)';
      qHtml+='<div style="font-size:12px;background:#f8f8f8;padding:8px 12px;border-radius:8px;margin-bottom:6px;line-height:1.6;">'
        +'<strong>응시자 답변:</strong><br>'+ansVal+'</div>';
      
      // 정답 키워드/해설
      qHtml+='<div style="font-size:12px;background:#e8f4fd;padding:8px 12px;border-radius:8px;margin-bottom:8px;line-height:1.6;">'
        +'<strong>정답 키워드:</strong> '+q.ans.join(' / ')+'<br>'
        +'<strong>채점 기준:</strong> '+q.cri+'</div>';

      // 채점 버튼
      qHtml+='<div style="display:flex;align-items:center;gap:8px;">'
        +'<span style="font-size:12px;color:#666;">채점:</span>'
        +'<button class="grade-btn" data-qi="'+i+'" data-val="1" style="padding:5px 12px;font-size:12px;border-radius:8px;border:1.5px solid #28a745;background:'+(a.ok?'#d4edda':'#fff')+';color:#155724;cursor:pointer;font-weight:500;">정답</button>'
        +'<button class="grade-btn" data-qi="'+i+'" data-val="0" style="padding:5px 12px;font-size:12px;border-radius:8px;border:1.5px solid #dc3545;background:'+(!a.ok&&!a.skipped?'#fde8e8':'#fff')+';color:#721c24;cursor:pointer;font-weight:500;">오답</button>'
        +'</div>';
    }

    div.innerHTML=qHtml;
    qList.appendChild(div);
  });
  box.appendChild(qList);

  // 저장 버튼 (단답/서술 있을 때만)
  if(needGrade){
    var saveRow=document.createElement('div');
    saveRow.style.cssText='margin-top:1.25rem;display:flex;gap:8px;align-items:center;';
    saveRow.innerHTML='<button id="grade-save-btn" class="btn btn-p" style="padding:12px 24px;font-size:14px;margin:0;">채점 저장</button>'
      +'<span id="grade-msg" style="font-size:12px;color:#534AB7;"></span>';
    box.appendChild(saveRow);
  }

  modal.appendChild(box);
  document.body.appendChild(modal);

  // 닫기
  document.getElementById('detail-close-btn').onclick=function(){var m=document.getElementById('detail-modal');if(m)m.remove();};
  modal.onclick=function(e){if(e.target===modal){modal.remove();}};

  // 채점 버튼 클릭
  document.querySelectorAll('.grade-btn').forEach(function(btn){
    btn.onclick=function(){
      var qi=parseInt(this.dataset.qi);
      var val=parseInt(this.dataset.val);
      // 같은 문항 버튼 스타일 초기화
      document.querySelectorAll('.grade-btn[data-qi="'+qi+'"]').forEach(function(b){
        b.style.background='#fff';
      });
      this.style.background=val?'#d4edda':'#fde8e8';
      // 임시 저장
      if(!r._grading) r._grading={};
      r._grading[qi]=val;
    };
  });

  // 채점 저장
  var saveBtn=document.getElementById('grade-save-btn');
  if(saveBtn){
    saveBtn.onclick=async function(){
      if(!r._grading||Object.keys(r._grading).length===0){
        document.getElementById('grade-msg').textContent='채점할 문항을 선택해주세요.';return;
      }
      var msg=document.getElementById('grade-msg');
      msg.textContent='저장 중...';

      // answers 업데이트
      var addCorrect=0,subCorrect=0;
      Object.keys(r._grading).forEach(function(qi){
        qi=parseInt(qi);
        var newVal=r._grading[qi];
        var oldVal=r.answers[qi].ok?1:0;
        r.answers[qi].ok=!!newVal;
        if(newVal&&!oldVal) addCorrect++;
        if(!newVal&&oldVal) subCorrect++;
      });

      // 점수 재계산
      var sc=QS.filter(function(q){return q.type!=='essay';}).length;
      var newCorrect=(r.correct||0)+addCorrect-subCorrect;
      var newScore=Math.round(newCorrect/sc*100);
      r.correct=newCorrect;
      r.score=newScore;
      r._grading={};

      // GAS에 저장
      try{
        await fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'updateGrade',rec_id:r.id||r.rec_id,score:newScore,correct:newCorrect,answers:r.answers})
        });
      }catch(e){}
      // localStorage 업데이트
      try{var all=JSON.parse(localStorage.getItem('mp')||'[]');
        var fi=all.findIndex(function(x){return x.id===r.id;});
        if(fi>=0){all[fi]=r;localStorage.setItem('mp',JSON.stringify(all));}
      }catch(e){}

      msg.textContent='✓ 저장 완료! 총점: '+newScore+'점';
      rAst();
    };
  }
}

// 결과 삭제
async function delRec(idx){
  var r=_recs[idx];
  if(!r)return;
  if(!confirm(r.name+' 님의 결과를 삭제하시겠습니까?'))return;
  try{
    await fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'deleteRec',rec_id:r.id||r.rec_id})
    });
  }catch(e){}
  // localStorage에서도 삭제
  try{
    var all=JSON.parse(localStorage.getItem('mp')||'[]');
    all=all.filter(function(x){return x.id!==r.id;});
    localStorage.setItem('mp',JSON.stringify(all));
  }catch(e){}
  _recs.splice(idx,1);
  rAst();
  alert(r.name+' 님의 결과가 삭제되었습니다.');
}

function makeEmailBody(r){
  var sc=r.scorable||r.total;
  var pct=Math.round(r.score);

  // 문항별 HTML 생성
  var qRows='';
  var prevCh='';
  QS.forEach(function(q,i){
    var a=r.answers?r.answers[i]:null;
    if(!a) return;

    if(q.ch!==prevCh){
      if(prevCh!=='') qRows+='</table><br>';
      qRows+='<div style="background:#534AB7;color:#fff;padding:8px 14px;font-size:13px;font-weight:600;border-radius:8px 8px 0 0;margin-top:16px;">'+q.ch+'</div>'
        +'<table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;border:1px solid #e5e5e5;border-top:none;">';
      prevCh=q.ch;
    }

    var bgColor='#fff';
    var badge='';
    if(a.isEssay){bgColor='#EEF2FF';badge='<span style="background:#534AB7;color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">검토대기</span>';}
    else if(a.skipped){bgColor='#f9f9f9';badge='<span style="background:#aaa;color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">미응답</span>';}
    else if(a.ok){bgColor='#f0fff4';badge='<span style="background:#28a745;color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">정답 ✓</span>';}
    else{bgColor='#fff5f5';badge='<span style="background:#dc3545;color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">오답 ✗</span>';}

    var myAns='<span style="color:#aaa;font-size:12px;">미응답</span>';
    if(q.type==='mc'&&a.chosen>=0) myAns='<span style="color:#333;">'+q.opts[a.chosen]+'</span>';
    else if((q.type==='short'||q.type==='essay')&&a.val) myAns='<span style="color:#333;">'+a.val+'</span>';

    qRows+='<tr style="background:'+bgColor+';border-bottom:1px solid #e5e5e5;">'
      +'<td style="padding:10px 14px;width:32px;color:#aaa;font-size:12px;vertical-align:top;">'+(i+1)+'</td>'
      +'<td style="padding:10px 14px;vertical-align:top;">'
        +'<div style="font-size:13px;color:#333;margin-bottom:6px;line-height:1.5;">'+q.text+'</div>'
        +'<div style="font-size:12px;color:#666;">내 답: '+myAns+'</div>'
      +'</td>'
      +'<td style="padding:10px 14px;width:90px;text-align:center;vertical-align:top;">'+badge+'</td>'
      +'</tr>';
  });
  if(prevCh!=='') qRows+='</table>';

  var scoreColor=pct>=80?'#28a745':pct>=60?'#fd7e14':'#dc3545';

  var bodyHtml='<!DOCTYPE html><html><body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,sans-serif;">'
    +'<table width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:24px 16px;">'
    +'<table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">'

    // 헤더
    +'<tr><td style="background:#534AB7;border-radius:14px 14px 0 0;padding:28px 32px;text-align:center;">'
    +'<div style="color:#fff;font-size:22px;font-weight:700;">Maypure<span style="color:#F5A623;">+</span></div>'
    +'<div style="color:#C7C2F0;font-size:13px;margin-top:4px;">신입교육 시험 결과</div>'
    +'</td></tr>'

    // 점수 카드
    +'<tr><td style="background:#fff;padding:28px 32px;border-left:1px solid #e5e5e5;border-right:1px solid #e5e5e5;">'
    +'<p style="margin:0 0 4px;font-size:15px;color:#333;">안녕하세요, <strong>'+r.name+'</strong>님</p>'
    +'<p style="margin:0 0 20px;font-size:13px;color:#888;">응시일시: '+r.ts+'</p>'
    +'<table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f8f8;border-radius:12px;margin-bottom:24px;">'
    +'<tr>'
    +'<td style="padding:20px;text-align:center;border-right:1px solid #e5e5e5;">'
    +'<div style="font-size:36px;font-weight:700;color:'+scoreColor+';">'+pct+'점</div>'
    +'<div style="font-size:12px;color:#888;margin-top:4px;">총점</div>'
    +'</td>'
    +'<td style="padding:20px;text-align:center;border-right:1px solid #e5e5e5;">'
    +'<div style="font-size:36px;font-weight:700;color:#28a745;">'+r.correct+'</div>'
    +'<div style="font-size:12px;color:#888;margin-top:4px;">정답</div>'
    +'</td>'
    +'<td style="padding:20px;text-align:center;">'
    +'<div style="font-size:36px;font-weight:700;color:#dc3545;">'+(sc-r.correct)+'</div>'
    +'<div style="font-size:12px;color:#888;margin-top:4px;">오답</div>'
    +'</td>'
    +'</tr></table>'

    // 문항별 결과
    +'<div style="font-size:14px;font-weight:600;color:#333;margin-bottom:12px;">문항별 결과</div>'
    +qRows

    // 안내문구
    +'<div style="margin-top:24px;padding:14px 16px;background:#FFF3CD;border-radius:10px;font-size:12px;color:#856404;line-height:1.6;">'
    +'※ 서술형 문항은 관리자 검토 후 최종 점수가 반영됩니다.<br>'
    +'※ 정답 및 해설은 교육 담당자를 통해 확인하세요.'
    +'</div>'
    +'</td></tr>'

    // 푸터
    +'<tr><td style="background:#f0f0f0;border-radius:0 0 14px 14px;padding:16px 32px;text-align:center;">'
    +'<p style="margin:0;font-size:12px;color:#aaa;">Maypure+ 교육팀</p>'
    +'</td></tr>'

    +'</table></td></tr></table></body></html>';

  return bodyHtml;
}
